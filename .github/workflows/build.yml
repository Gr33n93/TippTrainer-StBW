name: Release AppImage

on:
  push:
    tags:
      - 'v*' # Baut und released nur bei Version-Tags (z. B. v1.0.0)
  workflow_dispatch: # Manueller Build ohne Release

jobs:
  build-appimage:
    name: Linux AppImage
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Dependencies installieren
        run: npm ci

      - name: Syntax-Check der Web-App
        run: npm run syntax-check

      - name: Electron-AppImage bauen
        run: npm run dist:appimage

      - name: Artefakte hochladen
        uses: actions/upload-artifact@v4
        with:
          name: tipptrainer-appimage
          path: dist-electron/*.AppImage
          retention-days: 30

  release:
    name: GitHub Release erstellen
    needs: build-appimage
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Artefakte herunterladen
        uses: actions/download-artifact@v4
        with:
          name: tipptrainer-appimage
          path: artifacts

      - name: Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.AppImage
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
